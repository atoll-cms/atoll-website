honeypot: website
success_message: Thank you, we will be in touch.

fields:
  name:
    type: text
    required: true
  email:
    type: email
    required: true
  message:
    type: text
    required: true

mail:
  to: admin@example.com
  subject: New contact request
  template: |
    Name: {{name}}
    E-Mail: {{email}}

    Message:
    {{message}}
