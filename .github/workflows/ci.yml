name: Website CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json, gd, openssl, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build static website locally with atoll
        run: php scripts/export-static.php dist
        env:
          ATOLL_EXPORT_BASE_URL: https://atoll-cms.github.io/atoll-website

      - name: Verify output
        run: |
          test -f dist/index.html
          test -f dist/sitemap.xml
