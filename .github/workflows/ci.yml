name: Website CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HTML sanity checks
        run: |
          test -f index.html
          grep -qi '<!doctype html>' index.html
          grep -qi '<title>' index.html
