name: Core Sync PR

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone upstream atoll-core
        run: git clone --depth 1 https://github.com/atoll-cms/atoll-core.git /tmp/atoll-core

      - name: Clone upstream atoll-starter
        run: git clone --depth 1 https://github.com/atoll-cms/atoll-starter.git /tmp/atoll-starter

      - name: Sync bundled core
        run: ./scripts/sync-core-from-upstream.sh /tmp/atoll-core

      - name: Sync CLI
        run: ./scripts/sync-cli-from-starter.sh /tmp/atoll-starter

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(runtime): sync bundled core and CLI from upstream"
          title: "chore(runtime): sync bundled core and CLI from upstream"
          body: |
            Automated sync of:
            - bundled `core/` from `atoll-cms/atoll-core` (main)
            - `bin/atoll` from `atoll-cms/atoll-starter` (main)

            This PR was created automatically to prevent runtime drift.
          branch: "chore/auto-sync-runtime"
          delete-branch: true
          labels: |
            automated
            core-sync
